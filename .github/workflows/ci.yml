name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci || npm install
      - run: npm test
# Deploy: configurar credenciais AWS (OIDC) e rodar ./aws-deploy.sh update.
# Requer um IAM Role de deploy com confiança no GitHub OIDC (a criar).
